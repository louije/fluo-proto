name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Scaleway CLI
        run: |
          SCW_URL=$(curl -fsSL https://api.github.com/repos/scaleway/scaleway-cli/releases/latest | grep -o 'https://[^"]*linux_amd64' | head -1)
          curl -fsSL "$SCW_URL" -o /usr/local/bin/scw
          chmod +x /usr/local/bin/scw

      - name: Login to Scaleway registry
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: scw login --access-key="$SCW_ACCESS_KEY" --secret-key="$SCW_SECRET_KEY" --organization-id=REDACTED_ORG_ID --project-id=REDACTED_PROJECT_ID --send-telemetry=false

      - name: Build and push Docker image
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: |
          docker login REDACTED_REGISTRY_BASE -u nologin --password-stdin <<< "$SCW_SECRET_KEY"
          docker build --platform linux/amd64 -t REDACTED_REGISTRY:latest .
          docker push REDACTED_REGISTRY:latest

      - name: Deploy container
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: scw container container deploy ${{ secrets.SCW_CONTAINER_ID }} region=fr-par
