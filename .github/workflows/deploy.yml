name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Scaleway CLI
        run: |
          SCW_URL=$(curl -fsSL https://api.github.com/repos/scaleway/scaleway-cli/releases/latest | grep -o 'https://[^"]*linux_amd64' | head -1)
          curl -fsSL "$SCW_URL" -o /usr/local/bin/scw
          chmod +x /usr/local/bin/scw

      - name: Configure Scaleway CLI
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: scw init secret-key="$SCW_SECRET_KEY" access-key="$SCW_ACCESS_KEY" organization-id="${{ secrets.SCW_ORG_ID }}" project-id="${{ secrets.SCW_PROJECT_ID }}" send-telemetry=false with-ssh-key=false install-autocomplete=false

      - name: Build and push Docker image
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_REGISTRY: ${{ secrets.SCW_REGISTRY }}
        run: |
          docker login "${SCW_REGISTRY%/*}" -u nologin --password-stdin <<< "$SCW_SECRET_KEY"
          docker build --platform linux/amd64 -t "$SCW_REGISTRY:latest" .
          docker push "$SCW_REGISTRY:latest"

      - name: Deploy container
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: scw container container deploy ${{ secrets.SCW_CONTAINER_ID }} region=fr-par
