<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Fluo{% endblock %} - Fluo Proto</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="/static/vendor/theme-inclusion/images/favicon.ico" type="image/ico">
    <link rel="stylesheet" href="/static/vendor/theme-inclusion/stylesheets/app.css">
    <link rel="stylesheet" href="/static/css/itou.css">
</head>
<body class="l-authenticated">
    <header role="banner" id="header">
        <section class="s-header-authenticated">
            <div class="s-header-authenticated__container container">
                <div class="s-header-authenticated__row row">
                    <div class="s-header-authenticated__col s-header-authenticated__col--logo-service col-auto d-flex align-items-center pe-0">
                        <a href="/">
                            <img src="/static/vendor/theme-inclusion/images/logo-plateforme-inclusion.svg"
                                 alt="Fluo Proto" height="90">
                        </a>
                    </div>
                    <div class="s-header-authenticated__col s-header-authenticated__col--nav col d-flex align-items-center justify-content-end pe-0">
                        <nav role="navigation" id="nav-primary" aria-label="Navigation principale">
                            <ul>
                                <li class="dropdown d-none d-sm-inline-block">
                                    <button type="button" class="btn btn-outline-primary btn-ico bg-white dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                                        <i class="ri-account-circle-line" aria-hidden="true"></i>
                                        <span class="ms-2">Mon espace</span>
                                    </button>
                                    <div class="dropdown-menu dropdown-menu-end">
                                        <span class="dropdown-item text-muted">PLIE Lille Avenir</span>
                                    </div>
                                </li>
                            </ul>
                        </nav>
                    </div>
                    <div class="s-header-authenticated__col s-header-authenticated__col--burger col-auto d-flex align-items-center ps-0">
                        <button type="button" class="btn btn-link btn-ico pe-0" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNav" aria-controls="offcanvasNav" aria-label="Ouvrir le menu">
                            <i class="ri-menu-line" aria-hidden="true"></i>
                            <span>Menu</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <div class="offcanvas" id="offcanvasNav" aria-label="Barre de navigation principale">
            <div class="offcanvas-header offcanvas-header--organization">
                <div class="dropdown dropdown-organization flex-grow-1 py-4">
                    <span class="btn btn-outline-primary btn-ico btn-block bg-white">
                        <i class="ri-building-line fw-medium" aria-hidden="true"></i>
                        <span>PLIE Lille Avenir</span>
                    </span>
                </div>
                <div class="border-start border-nuance-08 d-xl-none">
                    <button type="button" class="btn-link ps-4 pt-5 pe-2 me-n2" data-bs-dismiss="offcanvas" aria-label="Fermer">
                        <i class="ri-close-line" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
            <div class="offcanvas-body d-flex flex-column">
                <nav class="flex-grow-1" role="navigation" aria-label="Navigation principale">
                    <ul class="nav nav-tabs flex-column mb-3">
                        <li class="nav-item">
                            <a href="/" class="nav-link">
                                <i class="ri-home-line fw-medium" aria-hidden="true"></i>
                                <span>Tableau de bord</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/" class="nav-link active">
                                <i class="ri-compass-line fw-medium" aria-hidden="true"></i>
                                <span>Orientations</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#" class="nav-link">
                                <i class="ri-group-line fw-medium" aria-hidden="true"></i>
                                <span>Bénéficiaires</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <div class="global-messages-container">
        <div class="alert alert-danger alert-dismissible fade show" role="status">
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fermer"></button>
            <strong>PROTOTYPE – Données fictives</strong>
        </div>
    </div>

    <main id="main" role="main" class="s-main">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/vendor/jquery/jquery.min.js"></script>
    <script src="/static/vendor/bootstrap/popper.min.js"></script>
    <script src="/static/vendor/bootstrap/bootstrap.min.js"></script>
</body>
</html>
